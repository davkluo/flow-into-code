name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: executor/requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependencies
        run: python -m pip install -r executor/requirements-dev.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
      FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
      FIREBASE_SERVER_API_KEY: ${{ secrets.FIREBASE_SERVER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  build-and-push:
    needs: [check, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          APP_IMAGE="$ECR_REGISTRY/flow-into-code/app"
          docker build -t "$APP_IMAGE:${GITHUB_SHA}" -t "$APP_IMAGE:latest" .
          docker push "$APP_IMAGE:${GITHUB_SHA}"
          docker push "$APP_IMAGE:latest"

      - name: Build and push executor image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          EXECUTOR_IMAGE="$ECR_REGISTRY/flow-into-code/executor"
          docker build -t "$EXECUTOR_IMAGE:${GITHUB_SHA}" -t "$EXECUTOR_IMAGE:latest" ./executor
          docker push "$EXECUTOR_IMAGE:${GITHUB_SHA}"
          docker push "$EXECUTOR_IMAGE:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on EC2 via SSM
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          GITHUB_SHA: ${{ github.sha }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          cat > /tmp/ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
              "cd /home/ec2-user/flow-into-code",
              "git pull --ff-only origin main",
              "APP_IMAGE=${ECR_REGISTRY}/flow-into-code/app:${GITHUB_SHA} EXECUTOR_IMAGE=${ECR_REGISTRY}/flow-into-code/executor:${GITHUB_SHA} docker compose -f docker-compose.prod.yml pull",
              "APP_IMAGE=${ECR_REGISTRY}/flow-into-code/app:${GITHUB_SHA} EXECUTOR_IMAGE=${ECR_REGISTRY}/flow-into-code/executor:${GITHUB_SHA} docker compose -f docker-compose.prod.yml up -d",
              "docker image prune -f"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy flow-into-code ${GITHUB_SHA}" \
            --parameters file:///tmp/ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" || true

          STATUS=$(aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "Status" \
            --output text)

          echo "SSM command status: ${STATUS}"
          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text || true

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text || true

          if [ "${STATUS}" != "Success" ]; then
            exit 1
          fi
